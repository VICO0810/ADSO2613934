<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion app game</title>
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/master.css">
    <link rel="stylesheet" href="css/reset.css">
</head>

<body>
    <main class="dashboard">
        <header>
            <a href="javascript:;" class="btn-back">
            </a>
            <img src="images/Dashboard.png" alt="Dashboard">
            <svg class="btn-burger" viewBox="0 0 100 100" width="80">
                <path class="line top"
                    d="m 70,33 h -40 c 0,0 -8.5,-0.149796 -8.5,8.5 0,8.649796 8.5,8.5 8.5,8.5 h 20 v -20" />
                <path class="line middle" d="m 70,50 h -40" />
                <path class="line bottom"
                    d="m 30,67 h 40 c 0,0 8.5,0.149796 8.5,-8.5 0,-8.649796 -8.5,-8.5 -8.5,-8.5 h -20 v 20" />
            </svg>


        </header>
        <nav class="nav">
            
            <menu>
                <a href="login.html">
                    <img src="images/ico-login.svg" alt="Login">
                    Login
                </a>
                <a href="register.html">
                    <img src="images/ico-register.svg" alt="Register">
                    Register
                </a>

            </menu>
        </nav>
        <section>
            <div class="targets">
                <img src="images/carazul.png" alt="">
                <div class="view">
                    <a href=" Outfits"></a>
                </div>

            </div>
            <div class="targets">
                <img src="images/carrosa.png" alt="">
                <div class="view">
                    <a href=" Accessories"></a>
                </div>

            </div>
            <div class="targets">
                <img src="images/caramarillo.png" alt="">
                <div class="view">
                    <a href="Stylist"></a>
                </div>

            </div>
        </section>

    </main>
    <script src="js/jquery-3.7.1.min.js"></script>
    <script>
        $('header').on('click', '.btn-burger', function () {
            $(this).toggleClass('active')
            $('.nav').toggleClass('active')
        })
    </script>

</body>

</html>
